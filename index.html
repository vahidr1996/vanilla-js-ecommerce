<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فروشگاه من</title>
    <link rel="stylesheet" href="src/assets/css/style.css" />
  </head>
  <body class="bg-site">
    <!-- HEADER SECTION -->
    <header class="w-full z-50">
      <!-- Top Promotional Banner -->
      <div
        class="py-1.5 bg-slate-900 text-xs flex items-center justify-center gap-1"
      >
        <p class="text-white">
          🎉 جشنواره زمستانی: تا ۵۰٪ تخفیف روی تمام محصولات دیجیتال | کد تخفیف:
        </p>
        <span class="text-red-400">WINTER2025</span>
      </div>
      <!-- Top Header -->
      <div class="sticky top-0 z-50">
        <div class="bg-site/80 backdrop-blur-md">
          <div class="wrapper flex justify-between items-center gap-8 h-20">
            <div>لوگو</div>
            <!-- Limit max-width to prevent the flex-1 search bar from stretching too wide on large monitors -->

            <div
              class="flex items-center max-w-4xl flex-1 h-14 bg-gray-200/60 shadow-md border border-transparent has-[input:focus]:border-blue-500 has-[input:focus]:ring-4 has-[input:focus]:ring-blue-500/40 has-[input:focus]:bg-white rounded-2xl"
            >
              <div class="w-10 ps-1 flex items-center justify-center">
                <svg
                  class="w-5 h-5 stroke-gray-500"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    stroke-width="2.5"
                  ></path>
                </svg>
              </div>

              <input
                type="text"
                placeholder="جستجوی سراسری در محصولات ..."
                class="flex-1 px-1 outline-none placeholder:text-sm placeholder:font-bold placeholder:text-gray-500"
              />

              <div
                class="w-40 flex items-center justify-center border-s border-gray-300/60"
              >
                <button
                  class="flex items-center justify-center gap-2 shadow-md rounded-xl bg-white px-3 py-2 text-xs font-bold cursor-pointer border border-transparent transition duration-300 hover:border-primary group"
                >
                  <div
                    class="bg-gray-200/60 p-1 rounded-md group-hover:bg-primary group-hover:text-white"
                  >
                    <svg
                      class="w-3.5 h-3.5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="3"
                        d="M15 19l-7-7 7-7"
                      ></path>
                    </svg>
                  </div>
                  آرشیو محصولات
                </button>
              </div>
            </div>
            <!-- User Actions (Left Header) -->
            <div class="flex items-center gap-3">
              <button></button>
              <button
                class="flex items-center gap-2 px-4 py-2.5 rounded-xl text-gray-700 bg-white shadow-sm text-sm cursor-pointer font-bold border border-transparent hover:bg-primary-50/50 hover:border-primary-500/50 transition duration-300 group"
              >
                <svg
                  class="w-5 h-5 text-gray-600 group-hover:text-primary-600"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1.8"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                  ></path>
                </svg>
                ورود یا ثبت نام
              </button>
              <button></button>
            </div>
          </div>
        </div>

        <!-- Bottom Header -->
        <nav class="bg-white shadow-md border-t border-gray-100">
          <div class="wrapper flex justify-between items-center h-19">
            <div>منوها</div>
            <div>آدرس</div>
          </div>
        </nav>
      </div>
    </header>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
